<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>NEET SS Surgical Group – AI Study Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    :root {
      --primary: #004c91;
      --secondary: #1976d2;
      --accent: #00897b;
      --danger: #c62828;
      --bg: #f9fafc;
      --card-bg: #fff;
      --text: #222;
      --muted: #666;
      --shadow: 0 2px 6px rgba(0,0,0,0.08);
      --foundation: #43a047;
      --consolidation: #1e88e5;
      --revision: #ef6c00;
    }

    body {
      font-family: "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0 1rem 3rem;
    }

    header {
      background: var(--primary);
      color: #fff;
      text-align: center;
      padding: 1rem;
      border-radius: 0 0 12px 12px;
      box-shadow: var(--shadow);
      position: relative;
    }

    header img {
      height: 60px;
      position: absolute;
      left: 1rem;
      top: 0.8rem;
    }

    h1 { margin: 0; font-size: 1.8rem; }
    p { margin: 0.2rem 0; }

    form, .card {
      background: var(--card-bg);
      padding: 1rem;
      border-radius: 10px;
      box-shadow: var(--shadow);
      margin: 1rem auto;
      max-width: 650px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin: 0.4rem 0 1rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }

    button {
      background: var(--secondary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      margin: 5px;
      cursor: pointer;
    }
    button:hover { background: #0d47a1; }

    #loginArea, #registerArea, #plannerArea { display: none; }
    .muted { color: var(--muted); font-size: 0.9rem; }
  </style>
</head>

<body>
  <header>
    <img src="/static/logo.png" alt="Sushruta LGS Logo"/>
    <h1>NEET SS Surgical Group – Study Planner</h1>
    <p>Rule of 3 | Interleaved Theory ≠ MCQ | 1–3–5–7–9 Recall | Mocks @ D+7 & D−10</p>
  </header>

  <!-- LOGIN / REGISTER -->
  <section id="authArea">
    <div id="loginArea">
      <form id="loginForm">
        <h2>🔐 Login</h2>
        <input id="loginEmail" type="email" placeholder="Email" required/>
        <input id="loginPassword" type="password" placeholder="Password" required/>
        <button type="submit">Login</button>
        <button type="button" onclick="showRegister()">Register</button>
      </form>
    </div>

    <div id="registerArea">
      <form id="registerForm">
        <h2>🧾 Register</h2>
        <input id="regName" type="text" placeholder="Full Name" required/>
        <input id="regEmail" type="email" placeholder="Email" required/>
        <input id="regGoal" type="text" placeholder="Goal (e.g. Surgical Gastroenterology)" />
        <input id="regPassword" type="password" placeholder="Password" required/>
        <button type="submit">Create Account</button>
        <button type="button" onclick="showLogin()">Back to Login</button>
      </form>
    </div>
  </section>

  <!-- PLANNER SECTION -->
  <section id="plannerArea">
    <div class="card">
      <h2 id="welcomeMsg"></h2>
      <button onclick="logout()">Logout</button>
    </div>

    <form id="planForm" onsubmit="event.preventDefault(); makePlan();">
      <h2>🧭 Create a Study Plan</h2>
      <label>Start Date</label>
      <input id="start" type="date" required>
      <label>Exam Date</label>
      <input id="exam" type="date" required>
      <label>Hours / Day</label>
      <input id="hours" type="number" step="0.5" value="6">
      <label>Number of Mocks</label>
      <input id="mocks" type="number" min="0" value="4">
      <label>Plan Type</label>
      <select id="planType">
        <option value="full">Full Plan (Theory + MCQ + Recall + Mocks)</option>
        <option value="theory">Theory Only</option>
        <option value="mcq">MCQ Only</option>
        <option value="revision">Revision Only</option>
        <option value="mock">Mock Only</option>
      </select>
      <button type="submit">Generate Plan</button>
    </form>

    <div id="planOutput" class="card" style="display:none;">
      <h2>📘 Plan Summary</h2>
      <div id="summary"></div>
      <div id="weeks"></div>
      <div id="actions"></div>
    </div>
  </section>

  <script>
  const API = 'https://neetss-planner-735b64816561.herokuapp.com/api';
  let token = localStorage.getItem('token');
  let currentPlan = null;

  // --- Auth UI ---
  function showLogin() {
    document.getElementById('registerArea').style.display = 'none';
    document.getElementById('loginArea').style.display = 'block';
  }
  function showRegister() {
    document.getElementById('loginArea').style.display = 'none';
    document.getElementById('registerArea').style.display = 'block';
  }
  function logout() {
    localStorage.removeItem('token');
    location.reload();
  }

  // --- Auth Logic ---
  async function login(email, password) {
    const res = await fetch(`${API}/login`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    if (!res.ok) return alert('Invalid credentials');
    const data = await res.json();
    token = data.access_token;
    localStorage.setItem('token', token);
    loadUser();
  }

  async function register(name, email, password, goal) {
    const res = await fetch(`${API}/register`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, email, password, goal})
    });
    if (res.ok) { alert('Registered! Now login.'); showLogin(); }
    else alert('Error registering user');
  }

  async function loadUser() {
    if (!token) { showLogin(); return; }
    const res = await fetch(`${API}/me`, { headers: {Authorization: `Bearer ${token}`}});
    if (!res.ok) { showLogin(); return; }
    const user = await res.json();
    document.getElementById('authArea').style.display = 'none';
    document.getElementById('plannerArea').style.display = 'block';
    document.getElementById('welcomeMsg').textContent = `👋 Welcome, Dr. ${user.name} (${user.goal || 'General Surgery'})`;
  }

  // --- Form Handlers ---
  document.getElementById('loginForm').onsubmit = (e) => {
    e.preventDefault();
    login(loginEmail.value, loginPassword.value);
  };
  document.getElementById('registerForm').onsubmit = (e) => {
    e.preventDefault();
    register(regName.value, regEmail.value, regPassword.value, regGoal.value);
  };

  // --- Plan Generation ---
  async function makePlan() {
    const payload = {
      start_date: start.value,
      exam_date: exam.value,
      hours_per_day: parseFloat(hours.value),
      mocks: parseInt(mocks.value),
      avg_minutes_per_mcq: 2.5,
      plan_type: planType.value
    };
    const res = await fetch(`${API}/plan`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', Authorization: `Bearer ${token}`},
      body: JSON.stringify(payload)
    });
    if (!res.ok) return alert('Error generating plan');
    const data = await res.json();
    currentPlan = data;
    showPlan(data);
  }

  // --- Plan Display ---
  function showPlan(data) {
    document.getElementById('planOutput').style.display = 'block';

    const meta = data.meta || {};
    document.getElementById('summary').innerHTML = `
      <p><b>Start:</b> ${meta.start_date} &nbsp; <b>Exam:</b> ${meta.exam_date}</p>
      <p><b>Days:</b> ${meta.days} | <b>Hours/day:</b> ${meta.hours_per_day}</p>
      ${meta.mock_days_indexed ? `<p><b>Mocks:</b> ${meta.mock_days_indexed.length} planned</p>` : ""}
    `;

    // build weekly summaries dynamically
    const weeks = data.weekly_summaries || [];
    document.getElementById('weeks').innerHTML = weeks.map(w => {
      const phaseColor =
        w.phase.includes("Foundation") ? "var(--foundation)" :
        w.phase.includes("Consolidation") ? "var(--consolidation)" :
        w.phase.includes("Revision") ? "var(--revision)" : "#444";

      const notes = (w.focus_notes || []).map(n => `<li>${n}</li>`).join('');
      const targets = w.weekly_targets || {};
      const mocks = w.mocks ? `<p>🧠 <b>${w.mocks}</b> Mock${w.mocks > 1 ? 's' : ''} this week</p>` : '';

      return `
        <div style="border-left: 6px solid ${phaseColor}; padding-left: 10px; margin-bottom: 1rem;">
          <h3 style="color:${phaseColor}; margin-bottom:0;">Week ${w.week} — ${w.phase}</h3>
          <p class="muted">${w.start_date} → ${w.end_date}</p>
          <p><em>${w.quote}</em></p>
          ${mocks}
          ${notes ? `<ul>${notes}</ul>` : ""}
          <p>
            🎯 <b>Theory:</b> ${targets.theory_min || 0} min |
            <b>MCQs:</b> ${targets.approx_mcqs || 0} |
            <b>Recall:</b> ${targets.recall_min || 0} min
          </p>
        </div>
      `;
    }).join('');

    document.getElementById('actions').innerHTML = `
      <button onclick="savePlan()">💾 Save Plan</button>
      <button onclick="downloadPlan('pdf')">⬇️ PDF</button>
      <button onclick="downloadPlan('ics')">📅 Calendar</button>
    `;
  }

  async function savePlan() {
    const name = prompt('Enter name for this plan:', 'My NEET SS Plan');
    if (!name) return;
    const res = await fetch(`${API}/plans/save`, {
      method: 'POST',
      headers: {'Content-Type':'application/json', Authorization: `Bearer ${token}`},
      body: JSON.stringify({name, data: currentPlan})
    });
    if (res.ok) alert('✅ Plan saved!');
    else alert('Error saving plan');
  }

  async function downloadPlan(type) {
    const res = await fetch(`${API}/plans/download/1?type=${type}`, {
      headers: {Authorization: `Bearer ${token}`}
    });
    const blob = await res.blob();
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `NEETSS_StudyPlan.${type}`;
    link.click();
  }

  // INIT
  loadUser();
</script>
</body>
</html>

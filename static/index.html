<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>NEET SS Surgical Group – Study Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <style>
    :root {
      --primary: #004c91;
      --secondary: #1976d2;
      --accent: #00897b;
      --danger: #c62828;
      --bg: #f9fafc;
      --card-bg: #fff;
      --text: #222;
      --muted: #666;
      --shadow: 0 2px 6px rgba(0,0,0,0.08);
      --foundation: #43a047;
      --consolidation: #1e88e5;
      --revision: #ef6c00;
    }

    body {
      font-family: "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0 1rem 3rem;
      line-height: 1.6;
    }

    header {
      text-align: center;
      background: var(--primary);
      color: #fff;
      padding: 1.2rem;
      border-radius: 0 0 12px 12px;
      box-shadow: var(--shadow);
    }

    header h1 {
      margin: 0;
      font-size: 1.8rem;
      letter-spacing: 0.5px;
    }

    header p {
      font-size: 0.95rem;
      margin: 0.3rem 0 0;
      color: #e0e0e0;
    }

    form {
      background: var(--card-bg);
      padding: 1.2rem;
      border-radius: 12px;
      box-shadow: var(--shadow);
      margin: 2rem auto;
      max-width: 600px;
    }

    label {
      display: block;
      margin-top: 0.8rem;
      font-weight: 600;
      color: var(--primary);
    }

    input {
      padding: 8px;
      width: 100%;
      max-width: 100%;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }

    button {
      display: inline-block;
      background: var(--secondary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      margin-top: 1rem;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    button:hover { background: #0d47a1; }

    h2, h3 { color: var(--primary); }

    .summary-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 1rem 0;
    }

    .summary-card {
      flex: 1;
      min-width: 140px;
      background: var(--card-bg);
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 10px 14px;
      text-align: center;
    }

    .summary-card h3 {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .summary-card p {
      margin: 4px 0 0;
      font-weight: 600;
      color: var(--text);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
      margin-top: 1rem;
    }

    .card {
      background: var(--card-bg);
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 16px;
      position: relative;
    }

    .foundation { border-left: 5px solid var(--foundation); }
    .consolidation { border-left: 5px solid var(--consolidation); }
    .revision { border-left: 5px solid var(--revision); }

    .phase-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #fff;
    }

    .initial70 { background: var(--foundation); }
    .middle { background: var(--consolidation); }
    .revision-tag { background: var(--revision); }

    .mockday { color: var(--danger); font-weight: 700; }

    .muted { color: var(--muted); font-size: 0.9rem; }

    hr.section {
      margin: 2rem 0 1rem;
      border: none;
      border-top: 2px solid #ccc;
    }

    ul {
      margin: 0.4rem 0 0 1rem;
      padding: 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    footer {
      text-align: center;
      margin-top: 3rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .pagination {
      text-align: center;
      margin-top: 1.5rem;
    }

    .pagination button {
      margin: 0 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
    }

    .pagination button[disabled] {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <header>
    <h1>NEET SS Surgical Group – Study Planner</h1>
    <p>Rule of 3 | Interleaved Theory ≠ MCQ | 1–3–5–7–9 Recall | Mocks @ D+7 & D−10 (no consecutive mocks)</p>
  </header>

  <form onsubmit="event.preventDefault(); makePlan();">
    <label>Start Date</label>
    <input id="start" type="date" required />
    <label>Exam Date</label>
    <input id="exam" type="date" required />
    <label>Hours / Day</label>
    <input id="hours" type="number" step="0.5" min="1" value="6" />
    <label>Number of Mocks</label>
    <input id="mocks" type="number" min="0" value="4" />
    <label>Avg Minutes per MCQ (2.0–3.0)</label>
    <input id="permcq" type="number" step="0.1" min="2.0" max="3.0" value="2.5" />
    <button type="submit">Generate Plan</button>
  </form>

  <section id="summary"></section>
  <hr class="section">
  <section>
    <h2>📅 Weekly Overview</h2>
    <div id="weeks" class="grid"></div>
  </section>

  <hr class="section">
  <section>
    <h2>🧭 Daily Plan</h2>
    <div id="days" class="grid"></div>
  </section>

  <footer>
    © 2025 Sushruta LGS | Designed for NEET SS Surgical Group Aspirants
  </footer>

  <script>
    let currentPage = 1;
    const daysPerPage = 14;
    let allSchedule = [];

    async function makePlan() {
      const start = document.getElementById('start').value;
      const exam = document.getElementById('exam').value;
      const hours = parseFloat(document.getElementById('hours').value);
      const mocks = parseInt(document.getElementById('mocks').value, 10);
      const permcq = parseFloat(document.getElementById('permcq').value);
      const payload = { start_date: start, exam_date: exam, hours_per_day: hours, mocks: mocks, avg_minutes_per_mcq: permcq };

      const res = await fetch('/plan', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        alert('Error generating plan');
        return;
      }

      const data = await res.json();
      allSchedule = data.schedule;
      currentPage = 1;
      renderSummary(data);
      renderWeeks(data);
      renderDaysPage();
    }

    function renderSummary(data) {
      const s = document.getElementById('summary');
      s.innerHTML = `
        <h2>📘 Plan Summary</h2>
        <div class="summary-grid">
          <div class="summary-card"><h3>Start Date</h3><p>${data.meta.start_date}</p></div>
          <div class="summary-card"><h3>Exam Date</h3><p>${data.meta.exam_date}</p></div>
          <div class="summary-card"><h3>Total Days</h3><p>${data.meta.days}</p></div>
          <div class="summary-card"><h3>Hours/Day</h3><p>${data.meta.hours_per_day}</p></div>
          <div class="summary-card"><h3>Mocks Scheduled</h3><p>${data.meta.mock_days_indexed.length}</p></div>
        </div>
        <p class="muted">Mock Days: ${data.meta.mock_days_indexed.join(', ')}</p>
      `;
    }

    function renderWeeks(data) {
      const weeks = document.getElementById('weeks');
      weeks.innerHTML = '';
      data.weekly_summaries.forEach(w => {
        let phaseClass = '';
        if (w.phase.includes('Foundation')) phaseClass = 'foundation';
        else if (w.phase.includes('Consolidation')) phaseClass = 'consolidation';
        else phaseClass = 'revision';

        const el = document.createElement('div');
        el.className = `card ${phaseClass}`;
        el.innerHTML = `
          <h3>Week ${w.week} – ${w.phase}</h3>
          <div class="muted">${w.start_date} → ${w.end_date}</div>
          <p><b>Theory Topics:</b> ${w.theory_topics.join(', ')}</p>
          <p><b>MCQ Topics:</b> ${w.mcq_topics.join(', ')}</p>
          <p><b>Mocks:</b> ${w.mocks}</p>
          <ul>${w.suggestions.map(s => `<li>${s}</li>`).join('')}</ul>
        `;
        weeks.appendChild(el);
      });
    }

    function renderDaysPage() {
      const daysContainer = document.getElementById('days');
      daysContainer.innerHTML = '';

      const startIdx = (currentPage - 1) * daysPerPage;
      const endIdx = Math.min(startIdx + daysPerPage, allSchedule.length);
      const currentDays = allSchedule.slice(startIdx, endIdx);

      currentDays.forEach(d => {
        const el = document.createElement('div');
        el.className = 'card';
        const phaseColor = d.phase === 'initial70' ? 'initial70' :
                           d.phase === 'middle' ? 'middle' : 'revision-tag';

        if (d.is_mock_day) {
          el.innerHTML = `
            <h3>${d.date} <span class="mockday">— MOCK DAY</span></h3>
            <span class="phase-tag ${phaseColor}">${d.phase.toUpperCase()}</span>
            <p><b>Mock Exam:</b> ${d.mock.minutes} min + <b>Analysis:</b> ${d.mock.analysis_minutes} min</p>
            <p><b>Recall:</b> ${d.recall.due_topics.length ? d.recall.due_topics.join(', ') : '—'} (${d.recall.minutes} min)</p>
            <p class="muted">No Theory or MCQs today — Focus on analysis and spaced recall.</p>
          `;
        } else {
          el.innerHTML = `
            <h3>${d.date}</h3>
            <span class="phase-tag ${phaseColor}">${d.phase.toUpperCase()}</span>
            <p><b>Theory:</b> ${d.theory.topic} (${d.theory.minutes} min)</p>
            <p><b>MCQ:</b> ${d.mcq.topic} (${d.mcq.minutes} min, target ≈ ${d.mcq.target_questions})</p>
            <p><b>Recall:</b> ${d.recall.due_topics.length ? d.recall.due_topics.join(', ') : '—'} (${d.recall.minutes} min)</p>
          `;
        }

        daysContainer.appendChild(el);
      });

      const totalPages = Math.ceil(allSchedule.length / daysPerPage);
      const pagination = document.createElement('div');
      pagination.className = 'pagination';
      pagination.innerHTML = `
        <button onclick="prevPage()" ${currentPage === 1 ? 'disabled' : ''}>⏮️ Prev</button>
        <span>Page ${currentPage} of ${totalPages}</span>
        <button onclick="nextPage()" ${currentPage === totalPages ? 'disabled' : ''}>Next ⏭️</button>
      `;
      daysContainer.appendChild(pagination);
    }

    function nextPage() {
      const totalPages = Math.ceil(allSchedule.length / daysPerPage);
      if (currentPage < totalPages) {
        currentPage++;
        renderDaysPage();
        window.scrollTo(0, 400);
      }
    }

    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        renderDaysPage();
        window.scrollTo(0, 400);
      }
    }
  </script>
</body>
</html>
